<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUS2</title>

<style>
:root{
  --bg:#0f0f14;
  --card:#1c1c25;
  --text:#ffffff;
  --accent:#4ade80;
  --shadow:0 10px 30px rgba(0,0,0,.25);
}

body.light{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#111827;
  --accent:#2563eb;
  --shadow:0 10px 30px rgba(0,0,0,.08);
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* LOGIN */
#loginScreen{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.loginBox{
  background:var(--card);
  padding:30px;
  border-radius:16px;
  width:300px;
  box-shadow:var(--shadow);
}

.loginBox input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

.loginBox button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:var(--accent);
  color:white;
  font-weight:bold;
}

/* APP */
#app{display:none;}

.sidebar{
  width:230px;
  background:var(--card);
  padding:20px;
  position:fixed;
  height:100vh;
}

.logo{
  font-size:28px;
  font-weight:bold;
  margin-bottom:25px;
}

.sidebar button{
  width:100%;
  margin:6px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  background:transparent;
  color:var(--text);
  cursor:pointer;
  text-align:left;
  font-weight:bold;
}

.sidebar button:hover{
  background:var(--accent);
  color:white;
}

.content{
  margin-left:230px;
  padding:30px;
}

section{display:none;}
section.active{display:block;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:22px;
  cursor:pointer;
  box-shadow:var(--shadow);
}

.card:hover{
  transform:scale(1.03);
  background:var(--accent);
  color:white;
}

.detail{
  background:var(--card);
  padding:25px;
  border-radius:18px;
  box-shadow:var(--shadow);
}

.back{
  margin-bottom:15px;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

@media(max-width:800px){
  .sidebar{position:relative;width:100%;height:auto;}
  .content{margin-left:0;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="loginBox">
    <h2>Login til DUS2</h2>

    <input id="user" placeholder="Brugernavn">
    <input id="pass" type="password" placeholder="Kodeord">

    <button onclick="login()">Log ind</button>

    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
  <div class="logo">DUS2</div>

  <button onclick="show('home')">Forside</button>
  <button onclick="show('aktiviteter')">Aktiviteter</button>
  <button onclick="show('voksne')">Vores Voksne</button>

  <button onclick="toggleTheme()">Skift tema</button>
</div>

<div class="content">

<section id="home" class="active">
  <h1>Velkommen til DUS2</h1>
  <p>Et trygt og traditionelt fritidstilbud.</p>
</section>

<section id="aktiviteter">
  <h1>Aktiviteter</h1>

  <div class="grid">
    <div class="card" onclick="openActivity('makerspace')">Makerspace</div>
    <div class="card" onclick="openActivity('sport')">Sport</div>
    <div class="card" onclick="openActivity('kreativ')">Kreativitet</div>
    <div class="card" onclick="openActivity('ps5')">PS5 Gaming</div>
    <div class="card" onclick="openActivity('ude')">Udendørs</div>
    <div class="card" onclick="openActivity('inde')">Indendørs</div>
  </div>
</section>

<section id="detail">
  <button class="back" onclick="show('aktiviteter')">← Tilbage</button>
  <div class="detail" id="detailContent"></div>
</section>

<section id="voksne">
  <div class="detail">
    <h1>Vores Voksne</h1>
    <p>De voksne skaber tryghed, struktur og fællesskab.</p>
  </div>
</section>

</div>
</div>

<script>

function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  // 🔑 OPDATERET: kode er nu KUN 1234
  if(u === "dus2" && p === "1234"){
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    document.getElementById("error").innerText = "Forkert brugernavn eller kodeord";
  }
}

function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

function openActivity(type){

  const data = {
    makerspace:"<h2>Makerspace</h2><p>3D og kreative projekter.</p>",
    sport:"<h2>Sport</h2><p>Bevægelse og fællesskab.</p>",
    kreativ:"<h2>Kreativitet</h2><p>Design og idéer.</p>",
    ps5:"<h2>PS5 Gaming</h2><p>Gaming i kontrollerede rammer.</p>",
    ude:"<h2>Udendørs</h2><p>Leg og frisk luft.</p>",
    inde:"<h2>Indendørs</h2><p>Rolige aktiviteter.</p>"
  };

  document.getElementById("detailContent").innerHTML = data[type];
  show("detail");
}

</script>

</body>
</html>
